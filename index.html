<!DOCTYPE html>
<html>
<head>
    <title>HNRVC Firm</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- LOADER -->
<div id="loader">
    <div class="spinner"></div>
</div>

<div id="content" class="hidden">

<!-- NAVBAR -->
<nav class="navbar">
    <div class="logo">HRNVC Firm</div>
    <div >
        <a href="#services" class="menu">services</a>
        <a href="#team" class="menu">team</a>
        <a href="#contact" class="menu">contact</a>
    </div>
</nav>

<section class="hero-section">
    <div class="hero-content">
        <span class="top-tag">Chartered Accounting & Consultancy</span>
        <h1>Navigating Your <span class="highlight">Financial Future</span> with Precision.</h1>
        <p>Expert auditing, taxation, and corporate advisory services designed for the modern enterprise.</p>
        
        
    </div>
    
    <div class="hero-image">
        <div class="floating-card">
            <img src="HRNVC.jpg" alt="Icon">
        </div>
    </div>
</section>

<section class="services-container">
    <div class="service-box">
        <h3>Services</h3>
        <a href="#" class="learn-more">Read More </a>
    </div>

    <div class="service-box">
        <h3>Team</h3>
        <a href="#" class="learn-more">Read More </a>
    </div>

    <div class="service-box">
        <h3>Contact</h3>
        <a href="#" class="learn-more">Read More </a>
    </div>
</section>


<!-- FOOTER -->
<footer>
    <p>© 2026 HRNVC Firm</p>
</footer>

</div>

<!-- SCRIPT -->
<script>
window.addEventListener("load", function () {
    document.getElementById("loader").style.display = "none";
    const content = document.getElementById("content");
    content.classList.remove("hidden");
    content.classList.add("fade-in");
});
</script>
<script>
window.addEventListener("scroll", function () {
    const nav = document.querySelector(".navbar");
    nav.classList.toggle("scrolled", window.scrollY > 50);
});
</script>
</body>
</html>
